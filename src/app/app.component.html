<header class="app-header">
  <h1 class="app-title">AppCore UI Library</h1>
  <p class="app-subtitle">Component showcase and design system</p>
</header>

<main class="app-main">
  <section class="app-section" aria-labelledby="section-buttons">
    <h2 id="section-buttons" class="app-section__title">Buttons</h2>
    <p class="app-section__desc">Primary, secondary, tertiary, toned, and link variants across sizes.</p>

    <div class="app-subsection">
      <h3 class="app-subsection__title">Variants</h3>
      <div class="app-button-row">
        <AppCore-button
          label="Primary"
          type="primary"
          state="default"
          size="large"
          [showLeftIcon]="true"
          [showRightIcon]="false"
        />
        <AppCore-button
          label="Secondary"
          type="secondary"
          size="large"
          [showLeftIcon]="true"
          [showRightIcon]="false"
        />
        <AppCore-button
          label="Tertiary"
          type="tertiary"
          size="large"
          [showLeftIcon]="true"
          [showRightIcon]="false"
        />
        <AppCore-button
          label="Toned"
          type="toned"
          size="large"
          [showLeftIcon]="true"
          [showRightIcon]="false"
        />
        <AppCore-button
          label="Link"
          type="link"
          size="large"
          [showLeftIcon]="true"
          [showRightIcon]="false"
        />
      </div>
    </div>

    <div class="app-subsection">
      <h3 class="app-subsection__title">Sizes</h3>
      <div class="app-button-row">
        <AppCore-button label="Small" type="primary" size="small" [showLeftIcon]="true" [showRightIcon]="false" />
        <AppCore-button label="Medium" type="primary" size="medium" [showLeftIcon]="true" [showRightIcon]="false" />
        <AppCore-button label="Large" type="primary" size="large" [showLeftIcon]="true" [showRightIcon]="false" />
      </div>
    </div>

    <div class="app-subsection">
      <h3 class="app-subsection__title">With both icons</h3>
      <div class="app-button-row">
        <AppCore-button
          label="Button"
          type="primary"
          size="large"
          [showLeftIcon]="true"
          [showRightIcon]="true"
        />
      </div>
    </div>
  </section>
</main>
